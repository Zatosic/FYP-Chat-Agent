<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AI Business Agent</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center px-6 text-white">

    <div class="w-full max-w-md bg-gray-800 border border-gray-700 rounded-3xl shadow-2xl overflow-hidden">

        <div class="bg-blue-600 p-8 text-center">
            <h1 class="text-3xl font-bold">Create Account</h1>
            <p class="text-blue-100 mt-2 text-sm">
                Start building your AI-powered business assistant
            </p>
        </div>

        <div class="p-8">

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form action="/signup" method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm text-gray-400 mb-2">
                        Full Name
                    </label>

                    <input type="text"
                        name="name"
                        required autofocus placeholder="Enter your full name"
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">
                        Email Address
                    </label>

                    <input type="email"
                        name="email"
                        required
                        placeholder="Enter your email"
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">
                        Password
                    </label>

                    <input type="password"
                        name="password"
                        required
                        placeholder="Create password"
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 transition-all py-3 rounded-xl font-semibold shadow-lg">
                    Create Account
                </button>

            </form>

            <p class="text-center text-sm text-gray-400 mt-6">
                Already have an account?
                <a href="/login" class="text-blue-400 hover:text-blue-300">
                    Login
                </a>
            </p>

        </div>

    </div>

</body>
</html>
