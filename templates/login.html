<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Business Agent</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 min-h-screen flex items-center justify-center px-6 text-white">

    <div class="w-full max-w-md bg-gray-800 border border-gray-700 rounded-3xl shadow-2xl overflow-hidden">

        <div class="bg-blue-600 p-8 text-center">
            <h1 class="text-3xl font-bold">Welcome Back</h1>
            <p class="text-blue-100 mt-2 text-sm">
                Login to continue using your AI Business Agent
            </p>
        </div>

        <div class="p-8">

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-xl mb-6 text-sm">
                {{ messages[0] }}
            </div>
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm text-gray-400 mb-2">
                        Email Address
                    </label>

                    <input type="email"
                        name="email"
                        required
                        placeholder="Enter your email"
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                </div>

                <div>
                    <label class="block text-sm text-gray-400 mb-2">
                        Password
                    </label>

                    <input type="password"
                        name="password"
                        required
                        placeholder="Enter your password"
                        class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 transition-all py-3 rounded-xl font-semibold shadow-lg">
                    Login
                </button>

            </form>

            <div class="my-6 flex items-center gap-4">
                <div class="flex-1 h-px bg-gray-700"></div>
                <span class="text-gray-500 text-sm">OR</span>
                <div class="flex-1 h-px bg-gray-700"></div>
            </div>

            <a href="/login/google"
                class="w-full flex items-center justify-center gap-3 bg-white text-black py-3 rounded-xl font-medium hover:bg-gray-200 transition-all">

                <svg class="w-5 h-5" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 2.9l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
                    <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.2l-6.2-5.2C29.2 35.5 26.7 36 24 36c-5.2 0-9.6-3.3-11.1-8l-6.5 5C9.7 39.5 16.3 44 24 44z"/>
                    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.8-3 5.1-5.7 6.6l6.2 5.2C39.9 36.2 44 30.7 44 24c0-1.3-.1-2.3-.4-3.5z"/>
                </svg>

                Continue with Google
            </a>

            <p class="text-center text-sm text-gray-400 mt-6">
                Don't have an account?
                <a href="/signup" class="text-blue-400 hover:text-blue-300">
                    Create Account
                </a>
            </p>

        </div>

    </div>

</body>
</html>
