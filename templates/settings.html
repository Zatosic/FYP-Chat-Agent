<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Integration Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Smooth transition for the auto-hide */
        #toast { transition: opacity 0.5s ease, transform 0.5s ease; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="max-w-2xl w-full bg-gray-800 rounded-3xl shadow-2xl border border-gray-700 overflow-hidden">
        <div class="bg-blue-600 p-8 text-center">
            <h1 class="text-3xl font-bold">Integration Settings</h1>
            <p class="text-blue-100 mt-2">Configure your WhatsApp and E-commerce APIs</p>
        </div>
        
        <div class="p-8">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div id="toast" class="bg-green-500/20 border border-green-500 text-green-400 px-4 py-3 rounded-xl mb-6 flex justify-between items-center animate-fade">
                      <span class="font-medium flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                        </svg>
                        {{ message }}
                      </span>
                      <button onclick="this.parentElement.remove()" class="text-green-400 hover:text-white text-xl">&times;</button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/settings" method="POST" class="space-y-8">
                <section>
                    <h3 class="text-blue-400 font-bold uppercase text-xs tracking-widest mb-4">WhatsApp Business API</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="wa_number" value="{{ settings.wa_number or '' }}" placeholder="Phone Number" class="bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                        <input type="password" name="wa_api_key" value="{{ settings.wa_api_key or '' }}" placeholder="API Key" class="bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                    </div>
                </section>

                <section>
                    <h3 class="text-blue-400 font-bold uppercase text-xs tracking-widest mb-4">E-commerce Integration</h3>
                    <div class="space-y-4">
                        <select name="store_type" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                            <option value="shopify" {% if settings.store_type == 'shopify' %}selected{% endif %}>Shopify</option>
                            <option value="woocommerce" {% if settings.store_type == 'woocommerce' %}selected{% endif %}>WooCommerce</option>
                        </select>
                        <input type="text" name="store_url" value="{{ settings.store_url or '' }}" placeholder="Store Name (e.g., Tech Solutions)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                        <input type="password" name="store_api_key" value="{{ settings.store_api_key or '' }}" placeholder="Store Access Token" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition-all">
                    </div>
                </section>

                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold shadow-lg transition-all">Save Configuration</button>
                    <a href="/" class="flex-1 bg-gray-700 hover:bg-gray-600 py-4 rounded-xl font-bold text-center transition-all flex items-center justify-center">Back to Chat</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toast = document.getElementById('toast');
            if (toast) {
                // Wait 2 seconds before starting the fade
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(-10px)';
                    // Remove from DOM after transition finishes
                    setTimeout(() => toast.remove(), 500);
                }, 2000);
            }
        });
    </script>
</body>
</html>
